[project]
name = "manga-tagger"
version = "2.0.0"
description = "Manga cover auto-tagger using Local VLM and RAG"
requires-python = ">=3.11"

[tool.semantic_release]
version_variable = "pyproject.toml:version"
branch = "main"
upload_to_pypi = false
upload_to_release = true
build_command = "pip install build && python -m build"
changelog_file = "CHANGELOG.md"

[tool.semantic_release.commit_parser]
# Conventional commits format
# feat: -> minor version bump
# fix: -> patch version bump
# feat!:, fix!: -> major version bump
# Other types -> no release
patterns = [
    "^(?P<type>feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\\(.+\\))?(?P<scope>!)?: (?P<message>.+)",
]

[tool.semantic_release.version]
# Semantic versioning scheme
major = "{major}"
minor = "{minor}"
patch = "{patch}"

[tool.semantic_release.release]
# Release assets (optional)
# assets = []

[tool.semantic_release.changelog]
# Changelog configuration
template = """\
## What's Changed

{changes}

---
*Auto-generated by python-semantic-release*
"""

[tool.semantic_release.git]
# Git configuration
commit_message = "chore(release): {version}"
tag_message = "{version}"

# Ruff Linter Configuration
[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "C4", "SIM"]
ignore = ["E501", "B008"]

[tool.ruff.lint.isort]
known-first-party = ["app"]

# MyPy Configuration
[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
ignore_missing_imports = true
